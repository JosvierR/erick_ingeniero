# Despliegue Netlify — DLCI Electricidad NFC
# Si conectas el repo completo (erick_ingeniero), usa el netlify.toml de la raíz del repo.
# Si conectas solo la carpeta dlci-web, este archivo es suficiente.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps=false"

# HTML siempre fresco (SPA + actualizaciones de contenido)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# JS/CSS con hash de Vite — caché larga e inmutable
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Imágenes /dlci: revalidar siempre (las URLs llevan ?v= en la app)
[[headers]]
  for = "/dlci/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/*.vcf"
  [headers.values]
    Content-Type = "text/vcard; charset=utf-8"
    Content-Disposition = "attachment; filename=dlci-contact.vcf"

# SPA: una sola página con anclas (#servicios, etc.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
